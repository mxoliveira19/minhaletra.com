services:
  minhaletra_php:
    build:
      context: .
      dockerfile: Dockerfile
      target: php-runtime
    container_name: minhaletra_php
    restart: unless-stopped
    depends_on:
      - minhaletra_db
    environment:
      DB_HOST: ${DB_HOST:-minhaletra_db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-minhaletra}
      DB_USERNAME: ${DB_USERNAME:-minhaletra_user}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_AUTO_INIT_SCHEMA: ${DB_AUTO_INIT_SCHEMA:-0}
    networks:
      - minhaletra_net

  minhaletra_nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx-runtime
    container_name: minhaletra_nginx
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - minhaletra_php
    networks:
      - minhaletra_net

  minhaletra_db:
    image: mariadb:11.8
    container_name: minhaletra_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-minhaletra}
      MYSQL_USER: ${DB_USERNAME:-minhaletra_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-}
    volumes:
      - minhaletra_db_data:/var/lib/mysql
    ports:
      - "3308:3306"
    networks:
      - minhaletra_net

volumes:
  minhaletra_db_data:

networks:
  minhaletra_net:
    driver: bridge
