services:
  minhaletra_php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minhaletra_php
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
      - /var/www/html/node_modules
      - /var/www/html/vendor
    depends_on:
      - minhaletra_db
    networks:
      - minhaletra_net

  minhaletra_nginx:
    image: nginx:stable-alpine
    container_name: minhaletra_nginx
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - minhaletra_php
    networks:
      - minhaletra_net

  minhaletra_db:
    image: mariadb:11.8
    container_name: minhaletra_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: minhaletra
      MYSQL_USER: minhaletra_user
      MYSQL_PASSWORD: minhaletra_senha_forte
      MYSQL_ROOT_PASSWORD: root_senha_forte
    volumes:
      - minhaletra_db_data:/var/lib/mysql
    ports:
      - "3308:3306"
    networks:
      - minhaletra_net

volumes:
  minhaletra_db_data:

networks:
  minhaletra_net:
    driver: bridge